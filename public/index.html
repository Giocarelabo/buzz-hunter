<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>トレンド取得ツール</title>
</head>
<body>

<h1>トレンド取得ツール</h1>
<button onclick="getTrends()">取得する</button>

<div id="result"></div>

<script>
async function getTrends() {
  const res = await fetch('/api/trends');
  const data = await res.json();

  let html = '';
  data.forEach(item => {
    html += `
      <p>
        ${item.trend}<br>
        仕入れ: ${item.m_price}円<br>
        販売: ${item.a_price}円<br>
        利益: ${item.profit}円
      </p>
      <hr>
    `;
  });

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
