<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter｜利益商品発見ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background: #f5f5f5;
}

h2 { margin-bottom: 5px; }

button.main {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.profit {
  color: red;
  font-weight: bold;
  font-size: 18px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  color: white;
}

.copy { background: black; }
.amazon { background: orange; }
.mercari { background: red; }

.lock {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
  text-align: center;
}

.countdown {
  background: red;
  color: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-weight: bold;
}

.log {
  background: #fff3cd;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>🚨 今この瞬間も売れてます</h2>

<div class="countdown">
残り <span id="timer">03:00</span> で公開終了
</div>

<p style="color:red; font-weight:bold; font-size:18px;">
放置すると利益チャンス逃します
</p>

<div class="log" id="log">
● 誰かが今 +3,200円の利益を出しました
</div>

<button class="main" onclick="getTrends()">
🔥 トレンド商品を取得する
</button>

<p style="color:red;">※無料は1回だけです</p>

<div id="result"></div>

<div id="lockArea" class="lock" style="display:none;">

  <p style="font-weight:bold; font-size:18px;">
    🔒 続きは有料です
  </p>

  <p style="color:red;">
    このままだと利益チャンス逃します
  </p>

  <a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank">
    ▶ 今だけ500円（後日値上げ）
  </a>

  <br><br>

  <input type="password" id="pass" placeholder="購入者のみ">
  <br><br>

  <button onclick="unlock()">解除</button>

</div>

<script>
// カウントダウン
let time = 180;
setInterval(() => {
  let min = String(Math.floor(time/60)).padStart(2,'0');
  let sec = String(time%60).padStart(2,'0');
  document.getElementById("timer").innerText = min + ":" + sec;
  if(time > 0) time--;
},1000);

// 擬似ログ
const logs = [
  "● 誰かが今 +2,800円の利益を出しました",
  "● 誰かが今 +4,200円の利益を出しました",
  "● 誰かが今 +3,500円の利益を出しました"
];
setInterval(()=>{
  document.getElementById("log").innerText = logs[Math.floor(Math.random()*logs.length)];
},4000);

async function getTrends() {

  const viewed = localStorage.getItem("viewed");
  const unlocked = localStorage.getItem("unlocked");

  if (viewed && !unlocked) {
    document.getElementById("lockArea").style.display = "block";
    return;
  }

  localStorage.setItem("viewed", "true");

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try {
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = '<div style="background:yellow;padding:10px;">⚠ 3つ仕入れるだけで利益出ます</div>';

    data.forEach((item, index) => {

      const encoded = encodeURIComponent(item.trend);

      html += `
      <div class="card">

        <div style="color:green; font-weight:bold;">
          ✔ 実際に売れている商品
        </div>

        <div>#${index+1} 人気急上昇</div>

        <div style="font-size:18px;font-weight:bold;">
          ${item.trend}
        </div>

        <div>
          仕入れ：${item.m_price}円 → 販売：${item.a_price}円
        </div>

        <div class="profit">
          利益：+${item.profit}円
        </div>

        <p style="color:red; font-size:12px;">
          → 今すぐ検索しないと在庫なくなります
        </p>

        <button class="btn copy" onclick="copyText('${item.trend}')">
          📋 コピー
        </button>

        <button class="btn amazon" onclick="openAmazon('${encoded}')">
          🛒 Amazonで探す
        </button>

        <button class="btn mercari" onclick="openMercari('${encoded}')">
          📦 メルカリで探す
        </button>

      </div>
      `;
    });

    result.innerHTML = html;

  } catch (e) {
    result.innerHTML = "エラーが発生しました";
  }
}

function unlock() {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {
    localStorage.setItem("unlocked", "true");
    document.getElementById("lockArea").style.display = "none";
    alert("解除完了！もう一度押してください");
  } else {
    alert("パスワードが違います");
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

function openAmazon(keyword) {
  window.open(`https://www.amazon.co.jp/s?k=${keyword}`, '_blank');
}

function openMercari(keyword) {
  window.open(`https://www.mercari.com/jp/search/?keyword=${keyword}`, '_blank');
}
</script>

</body>
</html>
