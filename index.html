<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Buzz Hunter｜利益商品発見ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f5f5f5;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    button.main {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      margin-top: 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .card {
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .profit {
      color: red;
      font-size: 18px;
      font-weight: bold;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .cta {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-radius: 12px;
    }

    .cta a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    .lock {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 この方法で月5万円達成しました</h1>

<p>
今売れている商品と利益をそのまま公開しています。
</p>

<p style="color:red; font-weight:bold;">
※この情報は毎日更新されています
</p>

<button class="main" onclick="getTrends()">
🔥 トレンド商品を取得する
</button>

<div id="result"></div>

<div id="lockArea" class="lock" style="display:none;">
  <p>🔒 続きを見るにはパスワードを入力してください</p>
  <input type="password" id="pass">
  <br>
  <button onclick="unlock()">解除</button>
</div>

<div class="cta">
  <p style="font-size:18px; font-weight:bold;">
    この商品、実際に利益出てます👇
  </p>

  <a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank">
    ▶ 【500円】仕入れ方法の全手順を見る
  </a>

  <p style="font-size:12px;">
    ※購入者限定パスワード付き
  </p>
</div>

<script>
let viewed = localStorage.getItem("viewed");

async function getTrends() {

  // 2回目以降はロック
  if (viewed) {
    document.getElementById("lockArea").style.display = "block";
    return;
  }

  localStorage.setItem("viewed", "true");

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try {
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = '<div style="background:yellow;padding:10px;margin-top:10px;">⚠ この中から3つ仕入れるだけで利益出ます</div>';

    data.forEach((item, index) => {
      html += `
        <div class="card">
          <div style="font-size:14px; color:#888;">
            #${index+1} 人気急上昇
          </div>

          <div style="font-size:18px; font-weight:bold;">
            ${item.trend}
          </div>

          <div style="margin-top:10px;">
            仕入れ：${item.m_price}円 → 販売：${item.a_price}円
          </div>

          <div class="profit">
            利益：+${item.profit}円
          </div>

          <button class="copy-btn" onclick="copyText('${item.trend}')">
            📋 コピー
          </button>
        </div>
      `;
    });

    result.innerHTML = html;

  } catch (e) {
    result.innerHTML = "エラーが発生しました";
  }
}

// パスワード解除
function unlock() {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {  // ←ここ自由に変更OK
    localStorage.removeItem("viewed");
    document.getElementById("lockArea").style.display = "none";
    alert("解除しました。もう一度ボタンを押してください");
  } else {
    alert("パスワードが違います");
  }
}

// コピー
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("コピーしました！");
}
</script>

</body>
</html>
