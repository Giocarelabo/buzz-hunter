<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter｜利益商品発見ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background: #f5f5f5;
}

button.main {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.profit {
  color: red;
  font-weight: bold;
  font-size: 18px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  color: white;
}

.copy { background: black; }
.amazon { background: orange; }
.mercari { background: red; }

.lock {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
  text-align: center;
}
</style>
</head>

<body>

<h2>🚀 この方法で月5万円達成</h2>

<p>今売れている商品と利益を公開中</p>

<button class="main" onclick="getTrends()">🔥 トレンド取得</button>

<div id="result"></div>

<div id="lockArea" class="lock" style="display:none;">
  <p>🔒 続きを見るにはパスワード</p>
  <input type="password" id="pass">
  <br><br>
  <button onclick="unlock()">解除</button>
</div>

<div style="background:black;color:white;padding:20px;margin-top:20px;border-radius:12px;text-align:center;">
  <p><b>この商品の仕入れ方法はこちら👇</b></p>
  <a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank" style="color:white;">
    ▶ 500円で全手順を見る
  </a>
</div>

<script>
async function getTrends() {

  const viewed = localStorage.getItem("viewed");
  const unlocked = localStorage.getItem("unlocked");

  // ロック判定
  if (viewed && !unlocked) {
    document.getElementById("lockArea").style.display = "block";
    return;
  }

  localStorage.setItem("viewed", "true");

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try {
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = '<div style="background:yellow;padding:10px;">⚠ 3つ仕入れるだけで利益出ます</div>';

    data.forEach((item, index) => {

      const encoded = encodeURIComponent(item.trend);

      html += `
      <div class="card">

        <div>#${index+1} 人気急上昇</div>

        <div style="font-size:18px;font-weight:bold;">
          ${item.trend}
        </div>

        <div>
          仕入れ：${item.m_price}円 → 販売：${item.a_price}円
        </div>

        <div class="profit">
          利益：+${item.profit}円
        </div>

        <button class="btn copy" onclick="copyText('${item.trend}')">
          📋 コピー
        </button>

        <button class="btn amazon" onclick="openAmazon('${encoded}')">
          🛒 Amazonで探す
        </button>

        <button class="btn mercari" onclick="openMercari('${encoded}')">
          📦 メルカリで探す
        </button>

      </div>
      `;
    });

    result.innerHTML = html;

  } catch (e) {
    result.innerHTML = "エラー発生";
  }
}

// ロック解除
function unlock() {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {
    localStorage.setItem("unlocked", "true");
    document.getElementById("lockArea").style.display = "none";
    alert("解除完了！もう一度押してください");
  } else {
    alert("パスワード違います");
  }
}

// コピー
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

// Amazon
function openAmazon(keyword) {
  window.open(`https://www.amazon.co.jp/s?k=${keyword}`, '_blank');
}

// メルカリ
function openMercari(keyword) {
  window.open(`https://www.mercari.com/jp/search/?keyword=${keyword}`, '_blank');
}
</script>

</body>
</html>
