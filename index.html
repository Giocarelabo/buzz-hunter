<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; background:#f5f5f5; }
button { width:100%; padding:15px; background:black; color:white; border:none; border-radius:10px; }
.card { background:white; padding:15px; margin-top:15px; border-radius:12px; }
.lock { display:none; background:white; padding:20px; margin-top:20px; border-radius:12px; text-align:center; }
.count { background:red; color:white; padding:10px; border-radius:10px; text-align:center; }
</style>
</head>

<body>

<h2>🚨 トレンド取得ツール</h2>

<div class="count">
残り <span id="timer">03:00</span>
</div>

<button id="btn">トレンド取得</button>

<div id="result"></div>

<div id="lock" class="lock">
<p>🔒 ロックされています</p>
<input type="password" id="pass">
<button onclick="unlock()">解除</button>
</div>

<script>

// ===== 初期化 =====
const LIMIT = 180;

// ★ 初回だけ時間セット
if (!localStorage.getItem("start")) {
  localStorage.setItem("start", Date.now());
}

// ===== タイマー =====
function timer(){

  const start = Number(localStorage.getItem("start"));
  const now = Date.now();

  const diff = Math.floor((now - start)/1000);
  const remain = LIMIT - diff;

  const el = document.getElementById("timer");

  if(remain <= 0){
    el.innerText = "00:00";
    localStorage.setItem("lock","true");
    document.getElementById("lock").style.display="block";
    return;
  }

  const m = String(Math.floor(remain/60)).padStart(2,'0');
  const s = String(remain%60).padStart(2,'0');

  el.innerText = m + ":" + s;
}

// 即実行＋ループ
timer();
setInterval(timer,1000);

// ===== ボタンイベント（これが重要）=====
document.getElementById("btn").addEventListener("click", async () => {

  // ロック
  if(localStorage.getItem("lock") && !localStorage.getItem("unlock")){
    document.getElementById("lock").style.display="block";
    return;
  }

  // 1回制限
  if(localStorage.getItem("used") && !localStorage.getItem("unlock")){
    document.getElementById("lock").style.display="block";
    return;
  }

  localStorage.setItem("used","true");

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try{
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = "";

    data.forEach((item,i)=>{
      html += `
      <div class="card">
        <b>${item.trend}</b><br>
        ${item.m_price}円 → ${item.a_price}円<br>
        利益 +${item.profit}円
      </div>
      `;
    });

    result.innerHTML = html;

  }catch{
    result.innerHTML = "エラー";
  }

});

// ===== パスワード =====
function unlock(){

  if(document.getElementById("pass").value === "buzz2026"){
    localStorage.setItem("unlock","true");
    document.getElementById("lock").style.display="none";
    alert("解除成功");
  }else{
    alert("違います");
  }
}

</script>

</body>
</html>
