<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; background:#f5f5f5; }
.note { background:black; color:white; padding:15px; border-radius:10px; text-align:center; margin-bottom:15px; }
.countdown { background:red; color:white; padding:10px; border-radius:10px; text-align:center; }
.main { width:100%; padding:15px; background:black; color:white; border-radius:10px; }
.card { background:white; padding:15px; margin-top:15px; border-radius:12px; }
.rank { color:red; font-weight:bold; }
.profit { color:red; font-weight:bold; }
.btn { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; color:white; }
.copy { background:black; }
.amazon { background:orange; }
.mercari { background:red; }
.lock { display:none; background:white; padding:20px; margin-top:20px; border-radius:12px; text-align:center; }
</style>
</head>

<body>

<script>
const NOTE_URL = "https://note.com/giocarelabo_1022/n/n9d85f96b94ac";
</script>

<div class="note">
<b>これ知らないと利益出ません👇</b><br>
<a id="noteTop" target="_blank">▶ 仕入れ先はこちら</a>
</div>

<h2>🔥 トレンドランキング（直近24時間）</h2>

<div class="countdown">
⏳ 残り <span id="timer">03:00</span>
</div>

<button class="main" id="btn">🚀 トレンド取得</button>

<div id="result"></div>

<div id="lock" class="lock">
<p><b>🔒 この端末はロックされています</b></p>

<a id="noteLock" target="_blank">▶ 解除はこちら</a>

<br><br>
<input type="password" id="pass">
<br><br>
<button onclick="unlock()">解除</button>
</div>

<script>

// ===== noteリンク =====
document.getElementById("noteTop").href = NOTE_URL;
document.getElementById("noteLock").href = NOTE_URL;

// ===== 初期化 =====
const LIMIT = 180;

// ★ startは絶対1回だけ
if (!localStorage.getItem("start")) {
  localStorage.setItem("start", Date.now());
}

// ===== タイマー =====
function timer(){
  const start = Number(localStorage.getItem("start"));
  const now = Date.now();

  const remain = LIMIT - Math.floor((now - start) / 1000);

  if(remain <= 0){
    document.getElementById("timer").innerText = "00:00";
    forceLock();
    return;
  }

  const m = String(Math.floor(remain/60)).padStart(2,'0');
  const s = String(remain%60).padStart(2,'0');

  document.getElementById("timer").innerText = m + ":" + s;
}

setInterval(timer,1000);
timer();

// ===== 強制ロック =====
function forceLock(){
  localStorage.setItem("locked","true");
  document.getElementById("result").innerHTML = "";
  if(!localStorage.getItem("unlock")){
    document.getElementById("lock").style.display="block";
  }
}

// ===== ページ読み込み時ロック判定 =====
if(localStorage.getItem("locked") && !localStorage.getItem("unlock")){
  forceLock();
}

// ===== ボタン =====
document.getElementById("btn").addEventListener("click", async () => {

  // 2回目 or 時間切れ
  if(localStorage.getItem("locked") && !localStorage.getItem("unlock")){
    forceLock();
    return;
  }

  // ★ 1回だけ許可
  if(localStorage.getItem("used") && !localStorage.getItem("unlock")){
    forceLock();
    return;
  }

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try{
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = "";

    data.forEach((item,i)=>{
      const kw = encodeURIComponent(item.trend);

      html += `
      <div class="card">
        <div class="rank">#${i+1}</div>
        <div><b>${item.trend}</b></div>
        <div>${item.m_price}円 → ${item.a_price}円</div>
        <div class="profit">+${item.profit}円</div>

        <button class="btn copy" onclick="copyText('${item.trend}')">コピー</button>
        <button class="btn amazon" onclick="window.open('https://www.amazon.co.jp/s?k=${kw}')">Amazon</button>
        <button class="btn mercari" onclick="window.open('https://www.mercari.com/jp/search/?keyword=${kw}')">メルカリ</button>
      </div>`;
    });

    result.innerHTML = html;

    // ★ 成功後にロックON（ここが重要）
    localStorage.setItem("used","true");

  }catch{
    result.innerHTML = "エラー";
  }

});

// ===== パス =====
function unlock(){
  if(document.getElementById("pass").value === "buzz2026"){
    localStorage.setItem("unlock","true");
    alert("解除成功");
    location.reload();
  }else{
    alert("違います");
  }
}

// ===== コピー =====
function copyText(t){
  navigator.clipboard.writeText(t);
}

</script>

</body>
</html>
