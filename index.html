<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; background:#f5f5f5; }
button.main { width:100%; padding:15px; background:black; color:white; border-radius:10px; }
.card { background:white; padding:15px; margin-top:15px; border-radius:12px; }
.profit { color:red; font-weight:bold; }
.btn { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; color:white; }
.copy { background:black; }
.amazon { background:orange; }
.mercari { background:red; }
.lock { background:white; padding:20px; margin-top:20px; border-radius:12px; text-align:center; }
.countdown { background:red; color:white; padding:10px; border-radius:10px; text-align:center; }
</style>
</head>

<body>

<!-- 上導線 -->
<div style="background:black;color:white;padding:15px;border-radius:10px;text-align:center;">
<b>仕入れ方法はこちら👇</b><br>
<a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank" style="color:white;">
▶ 今だけ500円（後日値上げ）
</a>
</div>

<h2>🚨 今この瞬間も売れてます</h2>

<div class="countdown">
残り <span id="timer">03:00</span>
</div>

<p style="color:red;">※時間終了後は閲覧不可</p>

<button class="main" onclick="getTrends()">🔥 トレンド取得</button>

<div id="result"></div>

<!-- ロック -->
<div id="lockArea" class="lock" style="display:none;">
<p><b>🔒 制限中</b></p>
<p style="color:red;">この情報はロックされました</p>

<a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank">
▶ 解除はこちら（500円）
</a>

<br><br>
<input type="password" id="pass">
<br><br>
<button onclick="unlock()">解除</button>
</div>

<!-- 下導線 -->
<div style="background:black;color:white;padding:20px;margin-top:20px;border-radius:12px;text-align:center;">
<b>完全解説はこちら👇</b><br>
<a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank" style="color:white;">
▶ 稼ぎ方を見る
</a>
</div>

<script>

// ===== 初期化（超重要）=====
const LIMIT = 180;

// 型を数値に変換（ここがバグ原因）
let start = Number(localStorage.getItem("startTime"));

if (!start) {
  start = Date.now();
  localStorage.setItem("startTime", start);
}

// ===== ロック判定 =====
function isLocked(){
  const now = Date.now();
  const diff = Math.floor((now - start)/1000);
  return diff >= LIMIT;
}

// ===== タイマー =====
function updateTimer(){
  const now = Date.now();
  const diff = Math.floor((now - start)/1000);
  const remain = LIMIT - diff;

  if(remain <= 0){
    document.getElementById("timer").innerText = "00:00";
    localStorage.setItem("locked","true");
    document.getElementById("lockArea").style.display="block";
    return;
  }

  let m = String(Math.floor(remain/60)).padStart(2,'0');
  let s = String(remain%60).padStart(2,'0');
  document.getElementById("timer").innerText = m+":"+s;
}

// 常時動かす
setInterval(updateTimer,1000);

// ===== トレンド取得（1回制御追加）=====
async function getTrends(){

  // ロック中なら即ブロック
  if(localStorage.getItem("locked") && !localStorage.getItem("unlocked")){
    document.getElementById("lockArea").style.display="block";
    return;
  }

  // ★ ここが重要（1回制限）
  if(localStorage.getItem("viewed") && !localStorage.getItem("unlocked")){
    document.getElementById("lockArea").style.display="block";
    return;
  }

  localStorage.setItem("viewed","true");

  const result = document.getElementById("result");
  result.innerHTML="読み込み中...";

  try{
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html="";

    data.forEach((item,i)=>{

      const kw = encodeURIComponent(item.trend);

      html += `
      <div class="card">
      <div>#${i+1} 人気急上昇</div>
      <div><b>${item.trend}</b></div>
      <div>仕入れ ${item.m_price}円 → 販売 ${item.a_price}円</div>
      <div class="profit">利益 +${item.profit}円</div>

      <button class="btn copy" onclick="copyText('${item.trend}')">コピー</button>
      <button class="btn amazon" onclick="openAmazon('${kw}')">Amazon</button>
      <button class="btn mercari" onclick="openMercari('${kw}')">メルカリ</button>
      </div>`;
    });

    result.innerHTML = html;

  }catch{
    result.innerHTML="エラー発生";
  }
}

// ===== パスワード =====
function unlock(){
  const correct = "buzz2026";

  if(document.getElementById("pass").value === correct){
    localStorage.setItem("unlocked","true");
    document.getElementById("lockArea").style.display="none";
    alert("解除成功");
  }else{
    alert("パスワード違います");
  }
}

// ===== その他 =====
function copyText(t){ navigator.clipboard.writeText(t); }
function openAmazon(k){ window.open(`https://www.amazon.co.jp/s?k=${k}`); }
function openMercari(k){ window.open(`https://www.mercari.com/jp/search/?keyword=${k}`); }

</script>

</body>
</html>
