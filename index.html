<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzz Hunter｜利益商品発見ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 5px;
}

button.main {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.profit {
  color: red;
  font-weight: bold;
  font-size: 18px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  color: white;
}

.copy { background: black; }
.amazon { background: orange; }
.mercari { background: red; }

.lock {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
  text-align: center;
}
</style>
</head>

<body>

<h2>🚀 このリストで実際に利益出ています</h2>

<p style="color:red; font-weight:bold;">
昨日も3商品で +8,200円
</p>

<p style="color:red;">
※この情報は1回だけ無料で見れます
</p>

<button class="main" onclick="getTrends()">
🔥 トレンド商品を取得する
</button>

<div id="result"></div>

<!-- ロック画面 -->
<div id="lockArea" class="lock" style="display:none;">

  <p style="font-weight:bold;">
    🔒 続きを見るには購入が必要です
  </p>

  <p style="color:red;">
    このまま閉じると機会損失になります
  </p>

  <a href="https://note.com/あなたのURL" target="_blank">
    ▶ 今すぐ500円で解除する
  </a>

  <br><br>

  <input type="password" id="pass" placeholder="購入者のみ">
  <br><br>

  <button onclick="unlock()">解除</button>

</div>

<div style="background:black;color:white;padding:20px;margin-top:20px;border-radius:12px;text-align:center;">
  <p><b>この商品の仕入れ方法はこちら👇</b></p>
  <a href="https://note.com/giocarelabo_1022/n/n9d85f96b94ac" target="_blank" style="color:white;">
    ▶ 500円で全手順を見る
  </a>
</div>

<script>
async function getTrends() {

  const viewed = localStorage.getItem("viewed");
  const unlocked = localStorage.getItem("unlocked");

  if (viewed && !unlocked) {
    document.getElementById("lockArea").style.display = "block";
    return;
  }

  localStorage.setItem("viewed", "true");

  const result = document.getElementById("result");
  result.innerHTML = "読み込み中...";

  try {
    const res = await fetch('/api/trends');
    const data = await res.json();

    let html = '<div style="background:yellow;padding:10px;">⚠ この中から3つ仕入れるだけで利益出ます</div>';

    data.forEach((item, index) => {

      const encoded = encodeURIComponent(item.trend);

      html += `
      <div class="card">

        <div>#${index+1} 人気急上昇</div>

        <div style="font-size:18px;font-weight:bold;">
          ${item.trend}
        </div>

        <div>
          仕入れ：${item.m_price}円 → 販売：${item.a_price}円
        </div>

        <div class="profit">
          利益：+${item.profit}円
        </div>

        <p style="color:red; font-size:12px;">
          → 今すぐ検索して仕入れてください
        </p>

        <button class="btn copy" onclick="copyText('${item.trend}')">
          📋 コピー
        </button>

        <button class="btn amazon" onclick="openAmazon('${encoded}')">
          🛒 Amazonで探す
        </button>

        <button class="btn mercari" onclick="openMercari('${encoded}')">
          📦 メルカリで探す
        </button>

      </div>
      `;
    });

    result.innerHTML = html;

  } catch (e) {
    result.innerHTML = "エラーが発生しました";
  }
}

function unlock() {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {
    localStorage.setItem("unlocked", "true");
    document.getElementById("lockArea").style.display = "none";
    alert("解除完了！もう一度ボタンを押してください");
  } else {
    alert("パスワードが違います");
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

function openAmazon(keyword) {
  window.open(`https://www.amazon.co.jp/s?k=${keyword}`, '_blank');
}

function openMercari(keyword) {
  window.open(`https://www.mercari.com/jp/search/?keyword=${keyword}`, '_blank');
}
</script>

</body>
</html>
