<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Hunter</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">

</head>
<body>

    <h1>Buzz Hunter</h1>

    <form method="POST">
        <button type="submit">トレンド取得</button>
    </form>

    {% for idea in ideas %}
        <hr>
        <h2>{{ idea.trend }}</h2>
        <p>ジャンル：{{ idea.idea }}</p>
        <p>仕入れ：{{ idea.m_price }}円</p>
        <p>販売：{{ idea.a_price }}円</p>
        <p>利益：{{ idea.profit }}円</p>

        <p>
            <a href="{{ idea.mercari_url }}" target="_blank">メルカリで見る</a><br>
            <a href="{{ idea.amazon_url }}" target="_blank">Amazonで見る</a>
        </p>

        <pre>{{ idea.post }}</pre>
    {% endfor %}

    <!-- Service Worker -->
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js")
        .then(function() {
            console.log("Service Worker Registered");
        })
        .catch(function(error) {
            console.log("Service Worker Error:", error);
        });
    }
    </script>

</body>
</html>
