<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Buzz Hunter</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .card {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            margin-top: 10px;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 10px;
        }
    </style>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("コピーしました！");
        }
    </script>
</head>
<body>

    <h1>🔥 Buzz Hunter</h1>

    <form method="POST">
        <button type="submit">トレンド取得</button>
    </form>

    {% for item in ideas %}

    <div class="card">
        <h3>{{ item.trend }}</h3>

        <p>副業アイデア：{{ item.idea }}</p>

        <p>
            メルカリ仕入れ目安：{{ item.m_price }}円<br>
            Amazon販売目安：{{ item.a_price }}円<br>
            想定利益：{{ item.profit }}円
        </p>

        <a href="{{ item.mercari_url }}" target="_blank">メルカリで見る</a><br>
        <a href="{{ item.amazon_url }}" target="_blank">Amazonで見る</a>

        <textarea rows="6">{{ item.post }}</textarea>

        <button class="copy-btn" onclick="copyText(`{{ item.post }}`)">投稿文コピー</button>
    </div>

    {% endfor %}

    <hr>

    <a href="/premium">👉 続きを見る（有料）</a>

</body>
</html>
