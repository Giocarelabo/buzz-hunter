<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzz Hunter</title>

<style>
body {
    font-family: sans-serif;
    padding: 15px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    background: black;
    color: white;
}
</style>

</head>

<body>

<h1>🔥 Buzz Hunter</h1>

<form method="POST">
<button type="submit">トレンドを取得</button>
</form>

<hr>

{% for item in ideas %}

<div class="card">

<h2>{{ item.trend }}</h2>

<p>副業アイデア → {{ item.idea }}</p>

<p>
メルカリ価格：{{ item.m_price }}円<br>
Amazon価格：{{ item.a_price }}円<br>
<strong>想定利益：+{{ item.profit }}円</strong>
</p>

<a href="{{ item.mercari_url }}" target="_blank">🛍 メルカリ</a><br>
<a href="{{ item.amazon_url }}" target="_blank">🛒 Amazon</a>

<br><br>

<textarea rows="6" style="width:100%">{{ item.post }}</textarea>

<button onclick="copyText(this)">📋 コピー</button>

</div>

{% endfor %}

<hr>

<button onclick="location.href='https://note.com/'">
👉 続きを使う（有料版はこちら）
</button>

<script>
function copyText(btn){
    let textarea = btn.previousElementSibling
    textarea.select()
    document.execCommand("copy")
    alert("コピーしました！")
}
</script>

</body>
</html>
